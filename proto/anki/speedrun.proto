syntax = "proto3";

option java_multiple_files = true;

package anki.speedrun;

import "anki/collection.proto";

// Speedrun read-only analytics. Read-only: no collection mutation, no undo.
service SpeedrunService {
  // Report how many of the supplied exam-profile topic tags are present in the
  // collection (hierarchical prefix match), plus the engine version string.
  rpc GetCoverage(GetCoverageRequest) returns (CoverageResponse);
  // Per-topic FSRS memory aggregate: mastered proportion (Wilson 95% range),
  // average recall, and an abstain flag when graded reviews are too few.
  rpc GetTopicMastery(GetTopicMasteryRequest) returns (TopicMasteryResponse);
  // Read the exam profile JSON stored in the (synced) collection config.
  rpc GetExamProfile(GetExamProfileRequest) returns (ExamProfileResponse);
  // Reposition NEW cards by points-at-stake (topic weight) + topic interleave.
  // Mutating: persisted new-card positions only (never review due-dates).
  rpc ReorderNewByPointsAtStake(ReorderNewRequest)
      returns (anki.collection.OpChangesWithCount);
  // SCAFFOLDING (non-AI, deterministic): per-topic Performance/Readiness
  // placeholders with ranges + abstain. Real models are Friday. Always abstains
  // today (no data => honest). UI wires these as future columns.
  rpc GetPerformanceReadiness(GetPerformanceReadinessRequest)
      returns (PerformanceReadinessResponse);
}

// Required: get_services() asserts one Backend<Name>Service per <Name>Service.
// Empty body => all SpeedrunService methods auto-delegate to the collection
// impl.
service BackendSpeedrunService {}

message GetCoverageRequest {
  // Exam-profile topic tags to check for, e.g. "calc", "calc::integration".
  repeated string required_tags = 1;
}

message CoverageResponse {
  // Number of required_tags present in the collection (by prefix match).
  uint32 covered = 1;
  // Total number of required_tags supplied.
  uint32 total = 2;
  // covered / total * 100, or 0.0 when total == 0.
  double percent = 3;
  // rslib version (crate::version::version()); proves which engine answered.
  string backend_version = 4;
}

message GetTopicMasteryRequest {
  // Topic ids (hierarchical tags) to score, e.g.
  // "calc::single_var::integration".
  repeated string topics = 1;
  // Retrievability threshold to count a card as "mastered"; 0 => default 0.9.
  double mastery_threshold = 2;
  // Minimum graded reviews before a topic reports a score; 0 => default 20.
  uint32 min_reviews = 3;
}

message TopicMastery {
  // The requested topic id, echoed back.
  string topic = 1;
  // Cards under this topic that have an FSRS memory state (usable data points).
  uint32 cards_with_data = 2;
  // Cards whose current retrievability >= mastery_threshold.
  uint32 mastered_count = 3;
  // Mean current retrievability across cards_with_data (0.0 if none).
  double avg_recall = 4;
  // Wilson 95% lower bound on the mastered proportion.
  double mastered_lower = 5;
  // Wilson 95% upper bound on the mastered proportion.
  double mastered_upper = 6;
  // Total graded (rated, scheduling-affecting) reviews across the topic's
  // cards.
  uint32 graded_reviews = 7;
  // True => below min_reviews or no data; the honest UI withholds the score.
  bool abstained = 8;
}

message TopicMasteryResponse {
  repeated TopicMastery topics = 1;
  // rslib version; proves which engine answered.
  string backend_version = 2;
}

message GetExamProfileRequest {
  // e.g. "gre_math". Empty => the default exam id.
  string exam_id = 1;
}

message ExamProfileResponse {
  // The profile JSON as stored (topics/labels/ets_weight/prereqs), or "" if
  // unset.
  string profile_json = 1;
  // Echo of the resolved exam id.
  string exam_id = 2;
}

message ReorderNewRequest {
  // Deck to reposition new cards in (children included).
  int64 deck_id = 1;
  // Per-topic content weights (from the exam profile). Topics are hierarchical
  // tags; a card belongs to a topic if a note tag == topic or starts "topic::".
  repeated TopicWeight topic_weights = 2;
  AblationMode mode = 3;
}

message TopicWeight {
  string topic = 1;
  double weight = 2;
}

enum AblationMode {
  // Points-at-stake ordering + topic interleave (the feature).
  ABLATION_MODE_FULL = 0;
  // Feature off: plain note-id reposition (baseline reorder).
  ABLATION_MODE_FEATURE_OFF = 1;
  // Plain Anki: no reposition at all (no-op).
  ABLATION_MODE_PLAIN = 2;
}

message GetPerformanceReadinessRequest {
  repeated string topics = 1;
}

message PerformanceReadinessResponse {
  // False once ANY topic emits a real (non-abstained) score. True while every
  // score abstains (no data yet). Kept for back-compat with the scaffolding UI.
  bool scaffolding = 1;
  repeated TopicScaffold topics = 2;
  // Overall exam readiness (200-990 scale; abstains until the give-up rule met).
  ScoreScaffold overall_readiness = 3;
  // APPEND-ONLY. Human-readable reason the overall score abstains ("" if scored).
  string abstain_reason = 4;
  // APPEND-ONLY. Concrete actions to unlock the overall readiness score.
  repeated UnlockRequirement unlock_requirements = 5;
}

message TopicScaffold {
  string topic = 1;
  ScoreScaffold performance = 2;
  ScoreScaffold readiness = 3;
  // APPEND-ONLY. §7d gap meter: declarative recall - problem accuracy for this
  // topic (0.0 when either side abstains). Positive => knows facts but can't yet
  // apply them on problems.
  double gap_delta = 4;
}

message ScoreScaffold {
  double point = 1;    // score point estimate (units per `scale`)
  double lower = 2;    // interval lower bound (same units)
  double upper = 3;    // interval upper bound (same units)
  bool abstained = 4;  // true => not enough data; UI withholds the number
  // APPEND-ONLY additions (all default 0 / UNIT for legacy readers):
  // Percentile rank 0-100 (0.0 while abstaining).
  double percentile = 5;
  // How to interpret point/lower/upper. Performance = UNIT (0..1); Readiness =
  // GRE_200_990. Without this a 200-990 score would be misread as a 0..1 band.
  ScoreScale scale = 6;
  // TimestampSecs of the newest input used to compute this score (0 if none).
  int64 last_updated = 7;
}

// APPEND-ONLY. Unit system for a ScoreScaffold's point/lower/upper.
enum ScoreScale {
  // 0.0-1.0 probability/proportion (Performance, recall).
  SCORE_SCALE_UNIT = 0;
  // GRE scaled score 200-990 (Readiness).
  SCORE_SCALE_GRE_200_990 = 1;
}

// APPEND-ONLY. One actionable requirement to unlock an abstaining score, e.g.
// "answer 12 more calculus items" or "complete 1 more timed mini-mock".
message UnlockRequirement {
  // Machine kind: "mini_mocks" | "coverage" | "interval_width" | "topic_items".
  string kind = 1;
  // Current value the user has (e.g. mini-mocks done, coverage fraction).
  double have = 2;
  // Threshold needed to unlock (from the exam-profile give-up config).
  double need = 3;
  // Human-readable instruction for the UI.
  string human = 4;
  // Optional topic id when kind == "topic_items" ("" otherwise).
  string topic = 5;
}
