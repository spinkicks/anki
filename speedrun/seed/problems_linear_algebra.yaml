# linear_algebra::linear_maps  (ets 0.08 — 6 problems)
# ---------------------------------------------------------------------------
- stem: "A linear map \\(T:\\mathbb{R}^5\\to\\mathbb{R}^3\\) has \\(\\dim(\\ker T)=2\\). By rank-nullity, what is \\(\\dim(\\operatorname{im} T)\\)?"
  choices: ["2", "3", "5", "1", "0"]
  correct: "B"
  numeric_answer: "3"
  technique: "rank-nullity"
  worked_solution: "Rank-nullity: \\(\\dim(\\ker T)+\\dim(\\operatorname{im} T)=\\dim(\\text{domain})=5\\). So \\(\\dim(\\operatorname{im} T)=5-2=3\\)."
  topic: "linear_algebra::linear_maps"
  source: "Hefferon, Linear Algebra (free license), Ch. 3"

- stem: "For \\(T:\\mathbb{R}^4\\to\\mathbb{R}^4\\) with rank \\(4\\), what is \\(\\dim(\\ker T)\\)?"
  choices: ["0", "1", "4", "2", "3"]
  correct: "A"
  numeric_answer: "0"
  technique: "rank-nullity"
  worked_solution: "Rank-nullity: \\(\\dim(\\ker T)=\\dim(\\text{domain})-\\operatorname{rank}=4-4=0\\). A trivial kernel means \\(T\\) is injective (here also bijective)."
  topic: "linear_algebra::linear_maps"
  source: "Hefferon, Linear Algebra (free license), Ch. 3"

- stem: "A linear map \\(T:V\\to W\\) is injective if and only if:"
  choices: ["its image is all of \\(W\\)", "its kernel is \\(\\{0\\}\\)", "\\(\\dim V=\\dim W\\)", "it is surjective", "its rank is \\(0\\)"]
  correct: "B"
  numeric_answer: ""
  technique: "injectivity-kernel"
  worked_solution: "A linear map is injective iff \\(\\ker T=\\{0\\}\\): if \\(T(u)=T(v)\\) then \\(T(u-v)=0\\), so \\(u-v\\in\\ker T\\); the kernel being trivial forces \\(u=v\\). Surjectivity concerns the image, a separate property."
  topic: "linear_algebra::linear_maps"
  source: "Hefferon, Linear Algebra (free license), Ch. 3"

- stem: "The linear map \\(T(x,y)=(x,0)\\) on \\(\\mathbb{R}^2\\) (projection onto the \\(x\\)-axis) has rank:"
  choices: ["0", "1", "2", "3", "undefined"]
  correct: "B"
  numeric_answer: "1"
  technique: "rank-of-projection"
  worked_solution: "The image is \\(\\{(x,0):x\\in\\mathbb{R}\\}\\), the \\(x\\)-axis, which is 1-dimensional. So the rank is \\(1\\). (The kernel is the \\(y\\)-axis, also dimension \\(1\\); \\(1+1=2=\\dim\\mathbb{R}^2\\) ✓.)"
  topic: "linear_algebra::linear_maps"
  source: "Hefferon, Linear Algebra (free license), Ch. 3"

- stem: "If \\(T:\\mathbb{R}^3\\to\\mathbb{R}^2\\) is a linear map, can \\(T\\) be injective?"
  choices: ["Yes, always", "No, because the domain dimension exceeds the codomain dimension", "Only if it is surjective", "Yes, if rank is 3", "Only if \\(T=0\\)"]
  correct: "B"
  numeric_answer: ""
  technique: "injectivity-dimension-bound"
  worked_solution: "By rank-nullity, \\(\\dim(\\ker T)=3-\\operatorname{rank}(T)\\). Since \\(\\operatorname{rank}(T)\\le\\dim(\\text{codomain})=2\\), we get \\(\\dim(\\ker T)\\ge3-2=1>0\\). A nontrivial kernel means \\(T\\) is never injective."
  topic: "linear_algebra::linear_maps"
  source: "Hefferon, Linear Algebra (free license), Ch. 3"

- stem: "The kernel of the linear map \\(T(x,y,z)=(x+y+z)\\) from \\(\\mathbb{R}^3\\to\\mathbb{R}\\) has dimension:"
  choices: ["0", "1", "2", "3", "does not exist"]
  correct: "C"
  numeric_answer: "2"
  technique: "kernel-dimension"
  worked_solution: "\\(\\ker T=\\{(x,y,z):x+y+z=0\\}\\) is a plane through the origin in \\(\\mathbb{R}^3\\), which is 2-dimensional. Check via rank-nullity: \\(T\\) is nonzero so \\(\\operatorname{rank}=1\\), and \\(\\dim\\ker=3-1=2\\)."
  topic: "linear_algebra::linear_maps"
  source: "Hefferon, Linear Algebra (free license), Ch. 3"
