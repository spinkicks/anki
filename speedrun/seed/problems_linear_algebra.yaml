# linear_algebra::eigen  (ets 0.10 — 8 problems)
# ---------------------------------------------------------------------------
- stem: "Find the eigenvalues of \\(\\begin{pmatrix}2&0\\\\0&3\\end{pmatrix}\\)."
  choices: ["\\(2,3\\)", "\\(0,0\\)", "\\(5\\) only", "\\(6\\) only", "\\(-2,-3\\)"]
  correct: "A"
  numeric_answer: ""
  technique: "eigenvalues-of-diagonal"
  worked_solution: "For a diagonal matrix the eigenvalues are the diagonal entries. So the eigenvalues are \\(2\\) and \\(3\\). (Check: \\(\\det(A-\\lambda I)=(2-\\lambda)(3-\\lambda)=0\\).)"
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "Find the eigenvalues of \\(A=\\begin{pmatrix}2&1\\\\1&2\\end{pmatrix}\\)."
  choices: ["\\(1,3\\)", "\\(2,2\\)", "\\(0,4\\)", "\\(-1,3\\)", "\\(1,2\\)"]
  correct: "A"
  numeric_answer: ""
  technique: "eigenvalue-char-poly"
  worked_solution: "Characteristic polynomial: \\(\\det(A-\\lambda I)=(2-\\lambda)^2-1=\\lambda^2-4\\lambda+3=(\\lambda-1)(\\lambda-3)\\). Roots \\(\\lambda=1\\) and \\(\\lambda=3\\)."
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "The trace of \\(\\begin{pmatrix}4&7\\\\2&1\\end{pmatrix}\\) equals the sum of its eigenvalues. What is that sum?"
  choices: ["5", "6", "4", "8", "\\(-2\\)"]
  correct: "A"
  numeric_answer: "5"
  technique: "trace-equals-sum-eigenvalues"
  worked_solution: "The trace is the sum of the diagonal entries: \\(4+1=5\\). The trace equals the sum of the eigenvalues, so that sum is \\(5\\)."
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "For \\(A=\\begin{pmatrix}3&0\\\\0&5\\end{pmatrix}\\), the product of the eigenvalues equals \\(\\det A\\). What is it?"
  choices: ["8", "15", "2", "0", "35"]
  correct: "B"
  numeric_answer: "15"
  technique: "det-equals-product-eigenvalues"
  worked_solution: "Eigenvalues are \\(3\\) and \\(5\\); their product is \\(15\\). This equals \\(\\det A=3\\cdot5-0=15\\)."
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "An eigenvector of \\(A=\\begin{pmatrix}2&0\\\\0&3\\end{pmatrix}\\) for the eigenvalue \\(2\\) is:"
  choices: ["\\((1,0)\\)", "\\((0,1)\\)", "\\((1,1)\\)", "\\((2,0)\\) only", "\\((0,0)\\)"]
  correct: "A"
  numeric_answer: ""
  technique: "eigenvector-computation"
  worked_solution: "We need \\(Av=2v\\). For \\(v=(1,0)\\): \\(Av=(2\\cdot1,\\,3\\cdot0)=(2,0)=2(1,0)\\) ✓. (The zero vector is never an eigenvector; \\((0,1)\\) has eigenvalue \\(3\\); \\((1,1)\\) is not an eigenvector.)"
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "Find the eigenvalues of the upper-triangular matrix \\(\\begin{pmatrix}1&5\\\\0&4\\end{pmatrix}\\)."
  choices: ["\\(1,4\\)", "\\(1,5\\)", "\\(5,4\\)", "\\(0,4\\)", "\\(1,0\\)"]
  correct: "A"
  numeric_answer: ""
  technique: "eigenvalues-of-triangular"
  worked_solution: "For a triangular matrix, the eigenvalues are the diagonal entries: \\(1\\) and \\(4\\). (Check: \\(\\det(A-\\lambda I)=(1-\\lambda)(4-\\lambda)=0\\), independent of the off-diagonal \\(5\\).)"
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "One eigenvalue of \\(A=\\begin{pmatrix}0&1\\\\-2&-3\\end{pmatrix}\\) is:"
  choices: ["\\(-1\\)", "1", "0", "3", "2"]
  correct: "A"
  numeric_answer: ""
  technique: "eigenvalue-char-poly"
  worked_solution: "\\(\\det(A-\\lambda I)=\\det\\begin{pmatrix}-\\lambda&1\\\\-2&-3-\\lambda\\end{pmatrix}=(-\\lambda)(-3-\\lambda)-(1)(-2)=\\lambda^2+3\\lambda+2=(\\lambda+1)(\\lambda+2)\\). Eigenvalues \\(-1,-2\\); \\(-1\\) is listed."
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

- stem: "Is the matrix \\(\\begin{pmatrix}1&1\\\\0&1\\end{pmatrix}\\) diagonalizable over \\(\\mathbb{R}\\)?"
  choices: ["Yes, two distinct eigenvalues", "No, only one independent eigenvector", "Yes, it is symmetric", "No, determinant is zero", "Yes, it is already diagonal"]
  correct: "B"
  numeric_answer: ""
  technique: "diagonalizability-test"
  worked_solution: "The only eigenvalue is \\(\\lambda=1\\) (repeated, from the triangular diagonal). Solving \\((A-I)v=0\\) gives \\(\\begin{pmatrix}0&1\\\\0&0\\end{pmatrix}v=0\\), i.e. the second component is \\(0\\); eigenvectors are multiples of \\((1,0)\\) — only ONE independent eigenvector. A \\(2\\times2\\) matrix needs 2 independent eigenvectors to be diagonalizable, so it is NOT diagonalizable."
  topic: "linear_algebra::eigen"
  source: "Hefferon, Linear Algebra (free license), Ch. 5"

